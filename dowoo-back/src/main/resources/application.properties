spring.application.name=dowoo

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dowoo}
spring.datasource.username=${DB_USER:dowoo}
spring.datasource.password=${DB_PASSWORD:dowoo}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# seed user (Phase 6에서 실제 OAuth2 로그인으로 대체 예정)
app.local-user-id=00000000-0000-0000-0000-000000000001

# Core API <-> AI API 내부 인증 토큰 (Phase 4에서 사용)
app.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.ai-api-base-url=${AI_API_BASE_URL:http://localhost:8000}

# api_keys.encrypted_key AES-256-GCM 마스터키 (Phase 2에서 사용, 운영 환경에서 반드시 재설정)
app.api-key-encryption-secret=${API_KEY_ENCRYPTION_SECRET:0123456789abcdef0123456789abcdef}
