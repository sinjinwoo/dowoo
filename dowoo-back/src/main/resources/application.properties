spring.application.name=dowoo

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dowoo}
spring.datasource.username=${DB_USER:dowoo}
spring.datasource.password=${DB_PASSWORD:dowoo}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# JWT 액세스 토큰 서명 시크릿(HS256, 최소 32바이트) - 운영 환경에서 반드시 재설정
app.jwt-secret=${JWT_SECRET:dev-only-jwt-secret-change-me-0123456789}
app.jwt-access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY_SECONDS:1800}

# 리프레시 토큰(HttpOnly 쿠키) 유효기간(일)
app.refresh-token-validity-days=${REFRESH_TOKEN_VALIDITY_DAYS:14}

# 리프레시 토큰 쿠키에 Secure 속성을 붙일지 여부 - HTTPS 뒤에 있을 때만 true (로컬 http 개발은 false)
app.cookie-secure=${COOKIE_SECURE:false}

# Core API <-> AI API 내부 인증 토큰 (Phase 4에서 사용)
app.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.ai-api-base-url=${AI_API_BASE_URL:http://localhost:8000}

# Core API -> AI API 커넥션 연결 타임아웃(초) - 같은 내부망이라 짧게 잡아도 됨
app.ai-api-connect-timeout-seconds=${AI_API_CONNECT_TIMEOUT_SECONDS:10}

# Core API -> AI API 크롤링 요청 read 타임아웃(초) - fetcher.py의 재시도(최대 5회 x 20초 + 403 백오프)
# 전체 소요 시간보다 넉넉하게 잡아야 정상 재시도 중인 크롤링을 중간에 끊지 않는다
app.crawl-connect-timeout-seconds=${CRAWL_CONNECT_TIMEOUT_SECONDS:10}
app.crawl-read-timeout-seconds=${CRAWL_READ_TIMEOUT_SECONDS:180}

# 번역 스트림 유휴(idle) 타임아웃(초) - 전체 응답 시간이 아니라 "이 시간 동안 새 데이터가
# 하나도 안 오면" 끊는다(긴 챕터는 정상적으로 몇 분씩 걸릴 수 있어 전체 시간에는 상한을 못 둠)
app.translate-idle-timeout-seconds=${TRANSLATE_IDLE_TIMEOUT_SECONDS:90}

# api_keys.encrypted_key AES-256-GCM 마스터키 (Phase 2에서 사용, 운영 환경에서 반드시 재설정)
app.api-key-encryption-secret=${API_KEY_ENCRYPTION_SECRET:0123456789abcdef0123456789abcdef}

# 프론트엔드(Vite dev server 등)에서 직접 호출을 허용할 오리진 (Phase 5)
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
