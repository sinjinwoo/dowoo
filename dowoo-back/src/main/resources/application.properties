spring.application.name=dowoo

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dowoo}
spring.datasource.username=${DB_USER:dowoo}
# 기본값 없음 - 배포 시 반드시 DB_PASSWORD를 설정해야 하며, 안 채우면 앱이 아예 기동되지 않는다
# (실수로 빠뜨려도 공개된 기본 비밀번호로 조용히 뜨는 일이 없도록 하기 위함).
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# 리버스 프록시(nginx/Caddy 등) 뒤에서도 X-Forwarded-Proto를 신뢰해 request.isSecure()가
# 정확히 판단되도록 한다 - 리프레시 토큰 쿠키의 Secure 속성을 여기 기반으로 자동 결정한다
# (AuthController 참고). 이 앱은 core-api를 직접 인터넷에 노출하거나 신뢰할 수 있는 리버스
# 프록시 뒤에 두는 두 형태만 지원하므로, 위조된 헤더를 보낼 수 있는 신뢰 불가능한 중간 홉은 없다고 가정한다.
server.forward-headers-strategy=framework

# JWT 액세스 토큰 서명 시크릿(HS256, 최소 32바이트). 기본값 없음 - 배포 시 반드시 설정해야 한다.
app.jwt-secret=${JWT_SECRET}

# Core API <-> AI API 내부 인증 토큰. 기본값 없음 - 배포 시 반드시 설정해야 한다.
app.internal-token=${INTERNAL_TOKEN}
app.ai-api-base-url=${AI_API_BASE_URL:http://localhost:8000}

# api_keys.encrypted_key AES-256-GCM 마스터키. 기본값 없음 - 배포 시 반드시 설정해야 한다.
app.api-key-encryption-secret=${API_KEY_ENCRYPTION_SECRET}

# 프론트엔드(Vite dev server 등)에서 직접 호출을 허용할 오리진 - 프론트를 Core API가 같이
# 서빙하는 일반적인 배포에서는 쓰이지 않고, 로컬에서 프론트만 따로 개발할 때만 의미 있다.
app.cors-allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
