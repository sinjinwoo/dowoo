name: CI

# 배포용 docker-publish.yml과는 별개 - PR/push마다 테스트를 돌려서 코드가 깨지지 않았는지 확인한다.
# 오픈소스 프로젝트라 외부 기여자의 PR도 이 워크플로우로 자동 검증된다.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo-back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run tests
        run: ./gradlew test --no-daemon

  ai-api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dowoo/package-lock.json

      - run: npm ci
      - run: npm run lint
