name: CI

# 배포용 docker-publish.yml과는 별개 - PR/push마다 테스트를 돌려서 코드가 깨지지 않았는지 확인한다.
# 오픈소스 프로젝트라 외부 기여자의 PR도 이 워크플로우로 자동 검증된다.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo-back
    # DowooApplicationTests(contextLoads)가 전체 Spring 컨텍스트를 띄우면서 Flyway로 실제
    # Postgres에 접속을 시도한다 - 서비스 컨테이너로 띄워주지 않으면 이 테스트만 항상 실패한다.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dowoo
          POSTGRES_USER: dowoo
          POSTGRES_PASSWORD: dowoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dowoo -d dowoo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: dowoo
      DB_USER: dowoo
      DB_PASSWORD: dowoo
      JWT_SECRET: ci-test-jwt-secret-not-for-production-use-0123456789
      INTERNAL_TOKEN: ci-test-internal-token
      API_KEY_ENCRYPTION_SECRET: ci-test-api-key-encryption-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  ai-api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo-python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dowoo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dowoo/package-lock.json

      - run: npm ci
      - run: npm run lint
