# 개발/소스 빌드용 Compose 파일. 소스를 고쳐가며 로컬에서 이미지를 직접 빌드해 띄울 때 쓴다
# ("docker compose up --build -d"). 미리 빌드된 이미지를 받아서 쓰는 배포용 설정은
# docker-compose.prod.yml과 README의 "배포(사용자용)" 섹션을 참고.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dowoo}
      POSTGRES_USER: ${DB_USER:-dowoo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dowoo}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dowoo} -d ${DB_NAME:-dowoo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - dowoo-net

  core-api:
    build:
      context: .
      dockerfile: dowoo-back/Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dowoo}
      DB_USER: ${DB_USER:-dowoo}
      DB_PASSWORD: ${DB_PASSWORD:-dowoo}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      AI_API_BASE_URL: http://ai-api:8000
      API_KEY_ENCRYPTION_SECRET: ${API_KEY_ENCRYPTION_SECRET:-0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-0123456789}
    depends_on:
      postgres:
        condition: service_healthy
      ai-api:
        condition: service_healthy
    ports:
      - "${CORE_API_PORT:-8080}:8080"
    networks:
      - dowoo-net

  ai-api:
    build:
      context: ./dowoo-python
    restart: unless-stopped
    environment:
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dowoo-net


networks:
  dowoo-net:
    driver: bridge

volumes:
  postgres-data:
